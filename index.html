<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhishGuard AI</title>

<style>
body {
  background: #0a0d14;
  color: #e8edf5;
  font-family: Arial;
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
}

textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #111520;
  color: white;
  border: 1px solid #333;
  border-radius: 8px;
}

button {
  margin-top: 12px;
  padding: 12px;
  width: 100%;
  background: linear-gradient(135deg, #00f5a0, #00b4ff);
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.card {
  background: #111520;
  padding: 18px;
  margin-top: 18px;
  border-radius: 12px;
  border: 1px solid #1e2a45;
}

.badge {
  display: inline-block;
  padding: 6px 10px;
  border: 1px solid #444;
  border-radius: 8px;
  font-size: 12px;
  margin-top: 6px;
}

.section {
  margin-top: 15px;
}

.section h3 {
  margin-bottom: 6px;
  font-size: 14px;
  color: #00b4ff;
}

ul {
  padding-left: 18px;
}

</style>
</head>

<body>

<h1>🛡 PhishGuard AI</h1>
<p style="text-align:center;">Advanced phishing detection & attack intelligence</p>

<textarea id="input" placeholder="Paste URL, email, or message..."></textarea>
<button onclick="scan()">⚡ Scan Now</button>

<div id="result"></div>

<script>
async function scan() {
  const input = document.getElementById("input").value.trim();
  const resultDiv = document.getElementById("result");

  if (!input) {
    resultDiv.innerHTML = "⚠ Please enter something to scan.";
    return;
  }

  resultDiv.innerHTML = "🔍 Analyzing with AI...";

  try {
    const res = await fetch("/api/scan", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ input })
    });

    const data = await res.json();

    resultDiv.innerHTML = `
      <div class="card">
        <h2>${data.verdict || "UNKNOWN"} (${data.riskScore || 0}/100)</h2>
        <p>${data.summary || "No summary available."}</p>

        <div class="section">
          <h3>Threat Simulation</h3>
          <p>${
            data.verdict === "SAFE"
              ? "No direct phishing indicators detected. However, similar domains are often used in impersonation or social engineering attacks."
              : "This input matches patterns commonly used in phishing campaigns."
          }</p>
        </div>

        <div class="section">
          <p><strong>Confidence:</strong> ${data.confidence || "N/A"}%</p>
          <div class="badge">${data.attackType || "Unknown"}</div>
        </div>

        <div class="section">
          <h3>Technical Breakdown</h3>
          <p>${data.technicalBreakdown?.domainAnalysis || "N/A"}</p>
          <p>${data.technicalBreakdown?.languageAnalysis || "N/A"}</p>
        </div>

        <div class="section">
          <h3>Attack Flow</h3>
          <ul>
            ${(data.timeline || []).map(t => `<li>${t}</li>`).join("")}
          </ul>
        </div>

        <div class="section">
          <h3>Indicators</h3>
          <ul>
            ${(data.indicators || []).map(i => `<li>${i.text || "N/A"}</li>`).join("")}
          </ul>
        </div>

        <div class="section">
          <h3>Recommendations</h3>
          <ul>
            ${(data.recommendations || []).map(r => `<li>${r}</li>`).join("")}
          </ul>
        </div>

        <div class="section">
          <h3>Learn</h3>
          <p>${data.educationalTip || "Stay cautious when interacting with unknown links or messages."}</p>
        </div>
      </div>
    `;
  } catch (e) {
    resultDiv.innerHTML = "❌ Error analyzing. Please try again.";
  }
}
</script>

</body>
</html>
