<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhishGuard AI</title>

<style>
body {
  background: #0a0d14;
  color: #e8edf5;
  font-family: Arial;
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #111520;
  color: white;
  border: 1px solid #333;
}

button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  background: #00f5a0;
  border: none;
  cursor: pointer;
}

.card {
  background: #111520;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
}

.badge {
  padding: 5px 10px;
  border: 1px solid #444;
  border-radius: 8px;
  font-size: 12px;
}
</style>
</head>

<body>

<h1>🛡 PhishGuard AI</h1>
<p>Advanced phishing detection & attack analysis</p>

<textarea id="input" placeholder="Paste URL, email, or message..."></textarea>
<button onclick="scan()">Scan</button>

<div id="result"></div>

<script>
async function scan() {
  const input = document.getElementById("input").value;
  const resultDiv = document.getElementById("result");

  resultDiv.innerHTML = "Analyzing...";

  try {
    const res = await fetch("/api/scan", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ input })
    });

    const data = await res.json();

    resultDiv.innerHTML = `
      <div class="card">
        <h2>${data.verdict} (${data.riskScore}/100)</h2>
        <p>${data.summary}</p>

        <p><strong>Confidence:</strong> ${data.confidence}%</p>
        <div class="badge">${data.attackType}</div>

        <h3>Technical Breakdown</h3>
        <p>${data.technicalBreakdown.domainAnalysis}</p>
        <p>${data.technicalBreakdown.languageAnalysis}</p>

        <h3>Attack Flow</h3>
        <ul>
          ${data.timeline.map(t => `<li>${t}</li>`).join("")}
        </ul>

        <h3>Indicators</h3>
        <ul>
          ${data.indicators.map(i => `<li>${i.text}</li>`).join("")}
        </ul>

        <h3>Recommendations</h3>
        <ul>
          ${data.recommendations.map(r => `<li>${r}</li>`).join("")}
        </ul>

        <h3>Learn</h3>
        <p>${data.educationalTip}</p>
      </div>
    `;
  } catch (e) {
    resultDiv.innerHTML = "Error analyzing.";
  }
}
</script>

</body>
</html>
