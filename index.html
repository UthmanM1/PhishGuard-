<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PhishGuard – AI Phishing Co-Pilot</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
body {
  background:#0a0d14;
  color:#e8edf5;
  font-family:'DM Sans',sans-serif;
  max-width:800px;
  margin:auto;
  padding:2rem;
}

textarea, button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button {
  background:#00f5a0;
  font-weight:bold;
  cursor:pointer;
}

.card {
  background:#111520;
  padding:1rem;
  border-radius:10px;
  margin-top:1rem;
}

.small { font-size:0.8rem; color:#7a8ba8; }
</style>
</head>

<body>

<h1>🛡 PhishGuard</h1>
<p class="small">AI cybersecurity assistant for everyday users</p>

<div class="card">
  <button onclick="loadExample('phishing')">⚠ Try Phishing Example</button>
  <button onclick="loadExample('safe')">✅ Try Safe Example</button>
</div>

<textarea id="mainInput" placeholder="Paste URL, email, or text..."></textarea>

<button onclick="runScan()">⚡ Scan</button>

<div id="result" class="card" style="display:none;"></div>

<script>
let currentTab = "text";

/* EXAMPLES */
function loadExample(type){
  const examples={
    phishing:"URGENT: Your PayPal account is locked. Verify now: http://paypa1-secure-login.xyz",
    safe:"Hi, just confirming our meeting tomorrow at 2pm. Thanks!"
  };
  document.getElementById("mainInput").value = examples[type];
}

/* MAIN SCAN */
async function runScan(){
  const input = document.getElementById("mainInput").value.trim();

  if(!input){
    alert("Paste something first");
    return;
  }

  try{
    const res = await fetch("/api/scan",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ input, type: currentTab })
    });

    if(!res.ok){
      throw new Error("API failed");
    }

    const result = await res.json();

    if(!result || !result.verdict){
      throw new Error("Invalid response");
    }

    render(result);

  }catch(err){
    console.warn("Using demo mode:", err);
    runDemoMode();
  }
}

/* DEMO MODE (IMPORTANT) */
function runDemoMode(){
  const demo = {
    verdict:"PHISHING",
    riskScore:88,
    summary:"This appears to be a phishing attempt.",
    simpleExplanation:"This message is trying to trick you into giving your password by pretending to be a trusted company.",
    attackType:"Credential Harvesting",
    confidence:92,
    analysis:"The message uses urgency and a fake domain to impersonate a trusted service.",
    recommendations:[
      "Do not click any links",
      "Verify via official website",
      "Report as phishing",
      "Delete immediately"
    ]
  };

  render(demo);
}

/* RENDER RESULT */
function render(r){
  const el = document.getElementById("result");
  el.style.display = "block";

  el.innerHTML = `
    <h2>${r.verdict} (${r.riskScore}/100)</h2>
    <p><strong>${r.summary}</strong></p>

    <p>🎯 Attack Type: ${r.attackType || "Unknown"}</p>
    <p>📊 Confidence: ${r.confidence || 80}%</p>

    <div class="card">
      <strong>🧠 Simple Explanation</strong>
      <p>${r.simpleExplanation || "This message may be unsafe."}</p>
    </div>

    <div class="card">
      <strong>🔍 Analysis</strong>
      <p>${r.analysis}</p>
    </div>

    <div class="card">
      <strong>💡 What to do</strong>
      <ul>${(r.recommendations || []).map(x=>`<li>${x}</li>`).join("")}</ul>
    </div>
  `;
}
</script>

</body>
</html>
