<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PhishGuard – AI Phishing Detector</title>

<style>
body {
  background: #0a0d14;
  color: #e8edf5;
  font-family: Arial;
  max-width: 800px;
  margin: auto;
  padding: 40px 20px;
}

textarea {
  width: 100%;
  padding: 12px;
  background: #111520;
  color: white;
  border: 1px solid #1e2a45;
  border-radius: 8px;
}

button {
  margin-top: 10px;
  padding: 12px;
  width: 100%;
  background: #00f5a0;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  padding: 20px;
  background: #111520;
  border-radius: 10px;
}

</style>
</head>

<body>

<h1>🛡 PhishGuard</h1>
<p>AI + Heuristic phishing detection system</p>

<textarea id="input" placeholder="Paste URL, email or message..."></textarea>
<button onclick="scan()">Scan</button>

<div id="result" class="result" style="display:none;"></div>

<script>
async function scan() {
  const input = document.getElementById("input").value.trim();
  if (!input) return alert("Enter something");

  const resultBox = document.getElementById("result");
  resultBox.style.display = "block";
  resultBox.innerHTML = "Analyzing...";

  try {
    const res = await fetch("/api/scan", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ input })
    });

    const data = await res.json();

    resultBox.innerHTML = `
      <h2>${data.verdict} (${data.riskScore}/100)</h2>
      <p>${data.summary}</p>
      <h3>Analysis</h3>
      <p>${data.analysis}</p>
      <h3>Indicators</h3>
      <ul>${data.indicators.map(i => `<li>${i.text}</li>`).join("")}</ul>
      <h3>Recommendations</h3>
      <ul>${data.recommendations.map(r => `<li>${r}</li>`).join("")}</ul>
    `;

  } catch (err) {
    resultBox.innerHTML = "Error. Using fallback demo.";

    // fallback demo mode
    resultBox.innerHTML = `
      <h2>SUSPICIOUS (60/100)</h2>
      <p>Demo fallback triggered</p>
      <p>This content shows characteristics commonly associated with phishing.</p>
    `;
  }
}
</script>

</body>
</html>
